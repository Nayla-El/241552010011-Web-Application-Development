<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width,
        initial-scale=1.0" />
    <title>Website Pertamaku</title>

<style>
    body {
        margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #fbc2eb, #a6c1ee);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
    }

    .container {
            background: rgba(255, 255, 255, 0.7);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            backdrop-filter: blur(10px);
    }

    h1 {
            color: #6a0572;
            font-size: 40px;
            margin-bottom: 10px;
    }

    p {
            color: #555;
            font-size: 18px;
            margin-bottom: 30px;
    }

    h3 {
            background-color: #ffffff;
            color: #4b0082;
            padding: 10px;
            border-radius: 15px;
            margin: 10px 0;
            transition: 0.3s;
    }

    h3:hover {
            transform: scale(1.05);
            background-color: #ffe0f7;
    }
    </style>
</head>

<body>
    <div class="container">  
        
    <h1 style="background-color: cadetblue; color: darkslateblue;">Ruang Imajinasi</h1>
    <p style="background-color: cadetblue;">Ini halaman web pertamaku.</p>
    <h3 style="background-color: cadetblue;">Langkah Kecil Menuju Inovasi Besar</h3>
    <h3 style="background-color: cadetblue;">Membangun Ide dari Nol Hingga Nyata</h3>
    <h3 style="background-color: cadetblue;">Kreativitas Adalah Kunci Masa Depan</h3>
    <h3 style="background-color: cadetblue;">Belajar, Berkembang, dan Berani Mencoba</h3>
    <h3 style="background-color: cadetblue;">Setiap Baris Kode Punya Cerita</h3>
    </div>
</body>
</html>
