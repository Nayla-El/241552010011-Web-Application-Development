<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Struktur Semantik HTML</title>
</head>

<body style="font-family: Arial, sans-serif; margin: 20px; font-size: 14px;">

<h2 style="text-align:center;">Perbandingan Non-Semantik vs Semantik</h2>

<div style="display: flex; gap: 20px;">

<!-- ================= NON SEMANTIK ================= -->
<div style="border:1px solid #333; padding:10px; width:220px;">
<h3 style="text-align:center;">Non-Semantik</h3>

<div style="background:#f8b400; padding:5px; text-align:center;">Header</div>
<div style="background:#6ab04c; padding:5px; text-align:center;">Navigation</div>
<div style="background:#2980b9; color:#fff; padding:5px; text-align:center;">Main Content</div>
<div style="background:#8e44ad; color:#fff; padding:5px; text-align:center;">Footer</div>

</div>

<!-- ================= SEMANTIK ================= -->
<div style="border:1px solid #333; padding:10px; width:220px;">
<h3 style="text-align:center;">Semantik</h3>

<header style="background:#f8b400; padding:5px; text-align:center;">Header</header>
<nav style="background:#6ab04c; padding:5px; text-align:center;">Navigation</nav>
<main style="background:#2980b9; color:#fff; padding:5px; text-align:center;">Main Content</main>
<footer style="background:#8e44ad; color:#fff; padding:5px; text-align:center;">Footer</footer>

</div>

</div>
